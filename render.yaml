
services:
  - type: web
    name: findmybizname
    env: node
    plan: free
    runtime: node
    nodeVersion: "20"
    buildCommand: yarn install && yarn build
    startCommand: yarn start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: findmybizname-db
          property: connectionString
      - key: RAPIDAPI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: GODADDY_API_KEY
        sync: false
      - key: GODADDY_API_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: COINBASE_COMMERCE_API_KEY
        sync: false

databases:
  - name: findmybizname-db
    databaseName: findmybizname
    user: findmybizname
    plan: free
