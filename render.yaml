services:
  - type: web
    name: findmybizname
    env: node
    plan: free
    runtime: node
    nodeVersion: "20"
    buildCommand: npm install
    startCommand: node production-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: findmybizname-db
          property: connectionString
      - key: RAPIDAPI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false

databases:
  - name: findmybizname-db
    databaseName: findmybizname
    user: findmybizname
    plan: free
