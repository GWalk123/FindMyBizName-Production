services:
  - type: web
    name: findmybizname
    env: node
    plan: free
    runtime: node
    nodeVersion: "20"
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production

databases:
  - name: findmybizname-db
    databaseName: findmybizname
    user: findmybizname
    plan: free
